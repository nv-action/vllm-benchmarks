name: Prepare source snapshot
description: Rebase the checked-out source onto a fixed base commit.
inputs:
  source-repository:
    description: Source repository containing the checked-out ref.
    required: false
    default: ''
  base-repository:
    description: Repository containing the fixed base commit.
    required: false
    default: ''
  base-ref:
    description: Base ref used to fetch the fixed base commit.
    required: false
    default: ''
  base-sha:
    description: Fixed base commit to rebase onto.
    required: false
    default: ''
  update-submodules:
    description: Update submodules after rebasing.
    required: false
    default: 'false'
runs:
  using: composite
  steps:
    - name: Rebase on ${{ inputs.base-ref }}
      if: inputs.base-sha != ''
      shell: bash
      env:
        SOURCE_REPOSITORY: ${{ inputs.source-repository || github.repository }}
        BASE_REPOSITORY: ${{ inputs.base-repository || inputs.source-repository || github.repository }}
        BASE_REF: ${{ inputs.base-ref }}
        BASE_SHA: ${{ inputs.base-sha }}
      run: |
        if [ -z "$BASE_REF" ]; then
          echo "::error::base-ref is required when base-sha is set."
          exit 1
        fi

        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        cd "$GITHUB_WORKSPACE"
        git config user.name "vllm-ascend-ci"
        git config user.email "vllm-ascend-ci@users.noreply.github.com"

        BASE_REMOTE=origin
        if [ "$BASE_REPOSITORY" != "$SOURCE_REPOSITORY" ]; then
          BASE_REMOTE=csrc-base
          git remote add "$BASE_REMOTE" "https://github.com/${BASE_REPOSITORY}.git"
        fi
        git fetch "$BASE_REMOTE" "$BASE_REF"
        git cat-file -e "${BASE_SHA}^{commit}"
        git rebase "$BASE_SHA"

    - name: Update submodules
      if: inputs.update-submodules == 'true'
      shell: bash
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        cd "$GITHUB_WORKSPACE"
        git submodule sync --recursive
        git submodule update --init --recursive
