name: Restore csrc cache
description: Restore and verify a vllm-ascend csrc build cache.
inputs:
  cache-arch:
    description: Cache architecture, for example ARM64 or X64. Inferred from the runner when empty.
    required: false
    default: ''
  image-tag:
    description: CANN build image tag.
    required: true
  csrc-hash:
    description: Pre-calculated csrc source hash.
    required: false
    default: ''
  lookup-only:
    description: Only check whether the cache exists.
    required: false
    default: 'false'
  cache-miss-policy:
    description: Cache miss behavior, either fail or continue.
    required: false
    default: continue
outputs:
  cache-hit:
    description: Whether an exact cache key was found.
    value: ${{ steps.restore.outputs.cache-hit }}
  cache-key:
    description: Resolved cache key.
    value: ${{ steps.key.outputs.cache_key }}
  csrc-hash:
    description: Resolved csrc source hash.
    value: ${{ steps.key.outputs.csrc_hash }}
runs:
  using: composite
  steps:
    - name: Calculate csrc hash
      id: hash
      if: inputs.csrc-hash == ''
      uses: ./.github/actions/calculate-csrc-hash

    - name: Resolve cache key
      id: key
      shell: bash
      env:
        INPUT_CACHE_ARCH: ${{ inputs.cache-arch }}
        INPUT_CSRC_HASH: ${{ inputs.csrc-hash }}
        CALCULATED_CSRC_HASH: ${{ steps.hash.outputs.csrc_hash }}
        IMAGE_TAG: ${{ inputs.image-tag }}
      run: |
        CACHE_ARCH="$INPUT_CACHE_ARCH"
        if [ -z "$CACHE_ARCH" ]; then
          case "$(uname -m)" in
            x86_64) CACHE_ARCH=X64 ;;
            aarch64) CACHE_ARCH=ARM64 ;;
            *) CACHE_ARCH=$(uname -m) ;;
          esac
        fi
        CSRC_HASH="${INPUT_CSRC_HASH:-$CALCULATED_CSRC_HASH}"
        CACHE_KEY="vllm-ascend-build-v1-${CACHE_ARCH}-${IMAGE_TAG}-${CSRC_HASH}"
        {
          echo "cache_key=$CACHE_KEY"
          echo "csrc_hash=$CSRC_HASH"
        } >> "$GITHUB_OUTPUT"

    - name: Restore csrc cache
      id: restore
      uses: runs-on/cache/restore@v5
      with:
        path: |
          vllm_ascend/_cann_ops_custom
          vllm_ascend/*.so
          vllm_ascend/lib
          vllm_ascend/include
        key: ${{ steps.key.outputs.cache_key }}
        lookup-only: ${{ inputs.lookup-only }}
        fail-on-cache-miss: ${{ inputs.cache-miss-policy == 'fail' }}

    - name: Verify restored csrc artifacts
      if: inputs.lookup-only != 'true' && steps.restore.outputs.cache-hit == 'true'
      shell: bash
      run: |
        if ! find vllm_ascend -maxdepth 1 -name '*.so' -type f 2>/dev/null | grep -q .; then
          echo "::error::The restored csrc cache does not contain a top-level shared library."
          exit 1
        fi
