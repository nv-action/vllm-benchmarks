# Main builds the full runner / chip / OS matrix. PR calls build one requested
# target. Both jobs delegate the actual build to _build_csrc_cache.yaml.
name: 'Cache csrc Build Artifacts'
on:
  push:
    branches: [ "main" ]
    paths:
      - 'csrc/**'
      - 'setup.py'
      - 'pyproject.toml'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'packages.txt'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'vllm_ascend/envs.py'
      - .github/workflows/push_build_csrc_cache.yaml
      - .github/workflows/_build_csrc_cache.yaml
  workflow_dispatch:
  workflow_call:
    inputs:
      enabled:
        type: boolean
        required: false
        default: false
        description: 'Whether this reusable workflow call needs a build.'
      device:
        type: string
        required: false
        default: ''
        description: 'Device type to build: a2, a3, or 310p.'
concurrency:
  group: ascend-csrc-build-${{ github.workflow }}-${{ github.ref }}-${{ inputs.device || 'scheduled' }}
  cancel-in-progress: true

jobs:
  build-cache:
    if: inputs.device == ''
    strategy:
      fail-fast: false
      matrix:
        runner:
          - linux-arm64-cpu-16
          - linux-amd64-cpu-16-hk
        device:
          - a2
          - a3
          - 310p
        os:
          - ubuntu
          - openeuler
        include:
          - device: a2
            os: ubuntu
            image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.1-910b-ubuntu22.04-py3.12
            soc_version: ascend910b1
          - device: a3
            os: ubuntu
            image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.1-a3-ubuntu22.04-py3.12
            soc_version: ascend910_9391
          - device: 310p
            os: ubuntu
            image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.1.0-beta.1-310p-ubuntu22.04-py3.12
            soc_version: ascend310p1
          - device: a2
            os: openeuler
            image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.1-910b-openeuler24.03-py3.12
            soc_version: ascend910b1
          - device: a3
            os: openeuler
            image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.1-a3-openeuler24.03-py3.12
            soc_version: ascend910_9391
          - device: 310p
            os: openeuler
            image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.1.0-beta.1-310p-openeuler24.03-py3.12
            soc_version: ascend310p1
    uses: ./.github/workflows/_build_csrc_cache.yaml
    with:
      runner: ${{ matrix.runner }}
      device: ${{ matrix.device }}
      os: ${{ matrix.os }}
      image: ${{ matrix.image }}
      soc_version: ${{ matrix.soc_version }}

  build-pr-cache:
    if: ${{ inputs.device != '' && inputs.enabled }}
    uses: ./.github/workflows/_build_csrc_cache.yaml
    with:
      runner: linux-arm64-cpu-16
      device: ${{ inputs.device }}
      os: ubuntu
      image: >-
        ${{
          (inputs.device == 'a2' && 'swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.1-910b-ubuntu22.04-py3.12') ||
          (inputs.device == 'a3' && 'swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.1-a3-ubuntu22.04-py3.12') ||
          (inputs.device == '310p' && 'swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.1.0-beta.1-310p-ubuntu22.04-py3.12')
        }}
      soc_version: >-
        ${{
          (inputs.device == 'a2' && 'ascend910b1') ||
          (inputs.device == 'a3' && 'ascend910_9391') ||
          (inputs.device == '310p' && 'ascend310p1')
        }}
