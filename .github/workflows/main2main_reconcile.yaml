name: Main2Main Reconcile

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Optional PR number to reconcile explicitly'
        required: false
        default: ''

permissions:
  contents: read
  issues: write
  pull-requests: read
  actions: write

concurrency:
  group: main2main-reconcile
  cancel-in-progress: false

env:
  UPSTREAM_REPO: nv-action/vllm-benchmarks

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ secrets.PAT_TOKEN }}
    defaults:
      run:
        working-directory: vllm-benchmarks
    steps:
      - name: Validate GitHub token scopes
        run: |
          gh auth status
          gh api graphql -f query='query { organization(login: "nv-action") { login } }' >/dev/null

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: Meihan-chen/vllm-benchmarks
          token: ${{ secrets.PAT_TOKEN }}
          path: vllm-benchmarks
          fetch-depth: 0

      - name: Resolve target PRs
        id: prs
        run: |
          if [ -n "${{ github.event.inputs.pr_number }}" ]; then
            printf '%s\n' "${{ github.event.inputs.pr_number }}" > /tmp/main2main_pr_numbers.txt
          else
            gh pr list \
              --repo "${{ env.UPSTREAM_REPO }}" \
              --label main2main \
              --state open \
              --json number \
              --jq '.[].number' > /tmp/main2main_pr_numbers.txt
          fi

      - name: Reconcile waiting_e2e and waiting_bisect states
        run: |
          set -euo pipefail
          if [ ! -s /tmp/main2main_pr_numbers.txt ]; then
            echo "::notice::No target main2main PRs to reconcile"
            exit 0
          fi

          while IFS= read -r PR_NUMBER; do
            [ -n "${PR_NUMBER}" ] || continue
            echo "::group::Reconcile PR ${PR_NUMBER}"

            gh pr view "${PR_NUMBER}" \
              --repo "${{ env.UPSTREAM_REPO }}" \
              --json number,headRefName,headRefOid,body,mergeable,mergeStateStatus,url > /tmp/main2main_pr.json
            gh api "repos/${{ env.UPSTREAM_REPO }}/issues/${PR_NUMBER}/comments" > /tmp/main2main_comments.json

            python3 <<'PY'
            import json
            from pathlib import Path

            comments = json.loads(Path("/tmp/main2main_comments.json").read_text(encoding="utf-8"))
            register = next((item for item in comments if "main2main-register" in item.get("body", "")), None)
            state = next((item for item in comments if "main2main-state:v1" in item.get("body", "")), None)

            if register is not None:
                Path("/tmp/main2main_register_comment.md").write_text(register["body"], encoding="utf-8")
                Path("/tmp/main2main_register_comment_id.txt").write_text(str(register["id"]), encoding="utf-8")
            if state is not None:
                Path("/tmp/main2main_state_comment.md").write_text(state["body"], encoding="utf-8")
                Path("/tmp/main2main_state_comment_id.txt").write_text(str(state["id"]), encoding="utf-8")
            Path("/tmp/main2main_comment_presence.json").write_text(
                json.dumps(
                    {
                        "has_register": register is not None,
                        "has_state": state is not None,
                    }
                ),
                encoding="utf-8",
            )
            PY

            HAS_REGISTER=$(python3 - <<'PY'
            import json
            from pathlib import Path
            print("true" if json.loads(Path("/tmp/main2main_comment_presence.json").read_text(encoding="utf-8"))["has_register"] else "false")
            PY
            )
            HAS_STATE=$(python3 - <<'PY'
            import json
            from pathlib import Path
            print("true" if json.loads(Path("/tmp/main2main_comment_presence.json").read_text(encoding="utf-8"))["has_state"] else "false")
            PY
            )

            if [ "${HAS_STATE}" != "true" ]; then
              TOKEN=$(python3 .github/workflows/scripts/main2main_ci.py mint-dispatch-token)
              if [ "${HAS_REGISTER}" = "true" ]; then
                python3 .github/workflows/scripts/main2main_ci.py state-init-from-register \
                  --comment-file /tmp/main2main_register_comment.md \
                  --dispatch-token "${TOKEN}" \
                  --updated-by main2main_reconcile.yaml/bootstrap > /tmp/main2main_state.json
              else
                python3 <<'PY'
                import json
                import re
                from pathlib import Path

                pr = json.loads(Path("/tmp/main2main_pr.json").read_text(encoding="utf-8"))
                body = pr.get("body") or ""
                match = re.search(r"\*\*Commit range:\*\* `([0-9a-f]{40})`\.\.\.`([0-9a-f]{40})`", body)
                if match is None:
                    raise SystemExit("cannot recover missing main2main state without register or commit range")
                payload = {
                    "pr_number": pr["number"],
                    "branch": pr["headRefName"],
                    "head_sha": pr["headRefOid"],
                    "old_commit": match.group(1),
                    "new_commit": match.group(2),
                    "phase": "2",
                    "status": "waiting_e2e",
                    "dispatch_token": "",
                    "e2e_run_id": "",
                    "fix_run_id": "",
                    "bisect_run_id": "",
                    "terminal_reason": "",
                    "last_transition": "reconcile/recover->waiting_e2e",
                    "updated_at": "",
                    "updated_by": "main2main_reconcile.yaml/recover",
                }
                Path("/tmp/main2main_state.json").write_text(json.dumps(payload, ensure_ascii=True, indent=2), encoding="utf-8")
                PY
                python3 <<PY
                import json
                from pathlib import Path
                payload = json.loads(Path("/tmp/main2main_state.json").read_text(encoding="utf-8"))
                payload["dispatch_token"] = "${TOKEN}"
                Path("/tmp/main2main_state.json").write_text(json.dumps(payload, ensure_ascii=True, indent=2), encoding="utf-8")
                PY
              fi

              python3 .github/workflows/scripts/main2main_ci.py state-write \
                --json-file /tmp/main2main_state.json > /tmp/main2main_state_comment.md
              gh pr comment "${PR_NUMBER}" \
                --repo "${{ env.UPSTREAM_REPO }}" \
                --body-file /tmp/main2main_state_comment.md >/tmp/main2main_state_comment_url.txt
              COMMENT_ID=$(gh api "repos/${{ env.UPSTREAM_REPO }}/issues/${PR_NUMBER}/comments" \
                --jq '.[] | select(.body | contains("main2main-state:v1")) | .id' | tail -n1)
              printf '%s' "${COMMENT_ID}" > /tmp/main2main_state_comment_id.txt
            else
              python3 .github/workflows/scripts/main2main_ci.py state-read \
                --comment-file /tmp/main2main_state_comment.md > /tmp/main2main_state.json
            fi

            PR_BRANCH=$(python3 - <<'PY'
            import json
            from pathlib import Path
            print(json.loads(Path("/tmp/main2main_pr.json").read_text(encoding="utf-8"))["headRefName"])
            PY
            )
            PR_HEAD_SHA=$(python3 - <<'PY'
            import json
            from pathlib import Path
            print(json.loads(Path("/tmp/main2main_pr.json").read_text(encoding="utf-8"))["headRefOid"])
            PY
            )
            PR_OLD_COMMIT=$(python3 - <<'PY'
            import json, re
            from pathlib import Path
            pr = json.loads(Path("/tmp/main2main_pr.json").read_text(encoding="utf-8"))
            body = pr.get("body") or ""
            match = re.search(r"\*\*Commit range:\*\* `([0-9a-f]{40})`\.\.\.`([0-9a-f]{40})`", body)
            print(match.group(1) if match else "")
            PY
            )
            PR_NEW_COMMIT=$(python3 - <<'PY'
            import json, re
            from pathlib import Path
            pr = json.loads(Path("/tmp/main2main_pr.json").read_text(encoding="utf-8"))
            body = pr.get("body") or ""
            match = re.search(r"\*\*Commit range:\*\* `([0-9a-f]{40})`\.\.\.`([0-9a-f]{40})`", body)
            print(match.group(2) if match else "")
            PY
            )
            if ! python3 .github/workflows/scripts/main2main_ci.py pr-consistency-check \
              --state-file /tmp/main2main_state.json \
              --branch "${PR_BRANCH}" \
              --head-sha "${PR_HEAD_SHA}" \
              --old-commit "${PR_OLD_COMMIT}" \
              --new-commit "${PR_NEW_COMMIT}" >/tmp/main2main_pr_guard.json; then
              echo "::warning::PR ${PR_NUMBER} metadata drifted away from stored state; skipping reconcile."
              echo "::endgroup::"
              continue
            fi

            STATUS=$(python3 - <<'PY'
            import json
            from pathlib import Path
            print(json.loads(Path("/tmp/main2main_state.json").read_text(encoding="utf-8"))["status"])
            PY
            )
            MERGE_STATE_STATUS=$(python3 - <<'PY'
            import json
            from pathlib import Path
            print(json.loads(Path('/tmp/main2main_pr.json').read_text(encoding='utf-8')).get('mergeStateStatus') or '')
            PY
            )
            MERGEABLE=$(python3 - <<'PY'
            import json
            from pathlib import Path
            print(json.loads(Path('/tmp/main2main_pr.json').read_text(encoding='utf-8')).get('mergeable') or '')
            PY
            )

            if [ "${STATUS}" = "waiting_e2e" ]; then
              HEAD_SHA=$(python3 - <<'PY'
              import json
              from pathlib import Path
              print(json.loads(Path("/tmp/main2main_state.json").read_text(encoding="utf-8"))["head_sha"])
              PY
              )
              gh run list \
                --repo "${{ env.UPSTREAM_REPO }}" \
                --workflow pr_test_full.yaml \
                -L 50 \
                --json databaseId,headSha,status,conclusion,createdAt,url > /tmp/main2main_e2e_runs.json

              MATCHED_RUN=""
              if python3 .github/workflows/scripts/main2main_ci.py select-e2e-run \
                --runs-file /tmp/main2main_e2e_runs.json \
                --head-sha "${HEAD_SHA}" > /tmp/main2main_e2e_run.json; then
                MATCHED_RUN=1
              fi

              if [ -n "${MATCHED_RUN}" ]; then
                python3 .github/workflows/scripts/main2main_ci.py reconcile-decision \
                  --state-file /tmp/main2main_state.json \
                  --e2e-run-file /tmp/main2main_e2e_run.json \
                  --merge-state-status "${MERGE_STATE_STATUS}" \
                  --mergeable "${MERGEABLE}" > /tmp/main2main_decision.json
              else
                python3 .github/workflows/scripts/main2main_ci.py reconcile-decision \
                  --state-file /tmp/main2main_state.json \
                  --merge-state-status "${MERGE_STATE_STATUS}" \
                  --mergeable "${MERGEABLE}" > /tmp/main2main_decision.json
              fi
            elif [ "${STATUS}" = "waiting_bisect" ]; then
              BISECT_RUN_ID=$(python3 - <<'PY'
              import json
              from pathlib import Path
              print(json.loads(Path("/tmp/main2main_state.json").read_text(encoding="utf-8")).get("bisect_run_id", ""))
              PY
              )
              if [ -n "${BISECT_RUN_ID}" ]; then
                BISECT_META=$(gh run view "${BISECT_RUN_ID}" --repo "${{ env.UPSTREAM_REPO }}" --json status,conclusion 2>/dev/null || echo '{}')
                BISECT_STATUS=$(python3 - <<'PY'
                import json
                import sys
                print((json.load(sys.stdin).get("status") or ""))
                PY
                <<< "${BISECT_META}")
                if [ "${BISECT_STATUS}" = "completed" ]; then
                  python3 .github/workflows/scripts/main2main_ci.py reconcile-decision \
                    --state-file /tmp/main2main_state.json \
                    --bisect-finished \
                    --finalize-missing > /tmp/main2main_decision.json
                else
                  python3 .github/workflows/scripts/main2main_ci.py reconcile-decision \
                    --state-file /tmp/main2main_state.json > /tmp/main2main_decision.json
                fi
              else
                python3 .github/workflows/scripts/main2main_ci.py reconcile-decision \
                  --state-file /tmp/main2main_state.json > /tmp/main2main_decision.json
              fi
            else
              echo '{"action":"ignore","reason":"state not handled by reconcile"}' > /tmp/main2main_decision.json
            fi

            ACTION=$(python3 - <<'PY'
            import json
            from pathlib import Path
            print(json.loads(Path("/tmp/main2main_decision.json").read_text(encoding="utf-8"))["action"])
            PY
            )
            RUN_ID=$(python3 - <<'PY'
            import json
            from pathlib import Path
            print(json.loads(Path("/tmp/main2main_decision.json").read_text(encoding="utf-8")).get("run_id", ""))
            PY
            )
            TERMINAL_REASON=$(python3 - <<'PY'
            import json
            from pathlib import Path
            print(json.loads(Path("/tmp/main2main_decision.json").read_text(encoding="utf-8")).get("terminal_reason", ""))
            PY
            )

            if [ "${ACTION}" = "wait" ] || [ "${ACTION}" = "ignore" ]; then
              echo "::notice::PR ${PR_NUMBER}: ${ACTION}"
              echo "::endgroup::"
              continue
            fi

            TOKEN=$(python3 .github/workflows/scripts/main2main_ci.py mint-dispatch-token)
            python3 <<PY
            import json
            from pathlib import Path
            state = json.loads(Path("/tmp/main2main_state.json").read_text(encoding="utf-8"))
            state["dispatch_token"] = "${TOKEN}"
            if "${RUN_ID}":
                state["e2e_run_id"] = "${RUN_ID}"
            if "${ACTION}" == "dispatch_fix_phase2":
                state["status"] = "fixing"
                state["phase"] = "2"
                state["last_transition"] = "reconcile->fix_phase2"
            elif "${ACTION}" == "dispatch_fix_phase3_prepare":
                state["status"] = "fixing"
                state["phase"] = "3"
                state["last_transition"] = "reconcile->fix_phase3_prepare"
            elif "${ACTION}" == "dispatch_manual_review":
                state["terminal_reason"] = "${TERMINAL_REASON}"
                state["last_transition"] = "reconcile->manual_review"
            elif "${ACTION}" == "dispatch_make_ready":
                state["last_transition"] = "reconcile->make_ready"
            elif "${ACTION}" == "dispatch_fix_phase3_finalize":
                state["last_transition"] = "reconcile->fix_phase3_finalize"
            state["updated_by"] = "main2main_reconcile.yaml"
            Path("/tmp/main2main_state_next.json").write_text(json.dumps(state, ensure_ascii=True, indent=2), encoding="utf-8")
            PY
            python3 .github/workflows/scripts/main2main_ci.py state-write \
              --json-file /tmp/main2main_state_next.json > /tmp/main2main_state_next_comment.md
            COMMENT_ID=$(cat /tmp/main2main_state_comment_id.txt)
            gh api --method PATCH "repos/${{ env.UPSTREAM_REPO }}/issues/comments/${COMMENT_ID}" \
              -f body="$(cat /tmp/main2main_state_next_comment.md)" >/dev/null

            case "${ACTION}" in
              dispatch_fix_phase2)
                gh workflow run main2main_auto.yaml \
                  --repo "${{ env.UPSTREAM_REPO }}" \
                  -f mode=fix_phase2 \
                  -f pr_number="${PR_NUMBER}" \
                  -f dispatch_token="${TOKEN}"
                ;;
              dispatch_fix_phase3_prepare)
                gh workflow run main2main_auto.yaml \
                  --repo "${{ env.UPSTREAM_REPO }}" \
                  -f mode=fix_phase3_prepare \
                  -f pr_number="${PR_NUMBER}" \
                  -f dispatch_token="${TOKEN}"
                ;;
              dispatch_fix_phase3_finalize)
                BISECT_RUN_ID_NEXT=$(python3 - <<'PY'
                import json
                from pathlib import Path
                print(json.loads(Path('/tmp/main2main_state_next.json').read_text(encoding='utf-8')).get('bisect_run_id', ''))
                PY
                )
                gh workflow run main2main_auto.yaml \
                  --repo "${{ env.UPSTREAM_REPO }}" \
                  -f mode=fix_phase3_finalize \
                  -f pr_number="${PR_NUMBER}" \
                  -f dispatch_token="${TOKEN}" \
                  -f bisect_run_id="${BISECT_RUN_ID_NEXT}"
                ;;
              dispatch_make_ready)
                gh workflow run main2main_terminal.yaml \
                  --repo "${{ env.UPSTREAM_REPO }}" \
                  -f action=make_ready \
                  -f pr_number="${PR_NUMBER}" \
                  -f dispatch_token="${TOKEN}"
                ;;
              dispatch_manual_review)
                gh workflow run main2main_terminal.yaml \
                  --repo "${{ env.UPSTREAM_REPO }}" \
                  -f action=manual_review \
                  -f pr_number="${PR_NUMBER}" \
                  -f dispatch_token="${TOKEN}" \
                  -f terminal_reason="${TERMINAL_REASON}"
                ;;
            esac

            echo "::endgroup::"
          done < /tmp/main2main_pr_numbers.txt
