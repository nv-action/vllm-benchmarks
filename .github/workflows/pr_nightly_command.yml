name: Handle /nightly Command

on:
  repository_dispatch:
    types: [nightly-command]

permissions:
  contents: read
  actions: write
  pull-requests: write
  issues: write

jobs:
  authorize:
    name: Check user authorization
    runs-on: ubuntu-latest
    outputs:
      test_cases: ${{ steps.resolve.outputs.test_cases }}
      branch: ${{ steps.resolve.outputs.branch }}
      is_authorized: ${{ steps.auth.outputs.is_authorized }}
    steps:
      - name: Check user authorization
        id: auth
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ACTOR='${{ github.event.client_payload.github.payload.comment.user.login }}'
          REPO='${{ github.event.client_payload.github.payload.repository.full_name }}'

          PERMISSION=$(gh api "repos/$REPO/collaborators/$ACTOR/permission" --jq '.permission')
          case "$PERMISSION" in
            triage|write|maintain|admin)
              echo "User $ACTOR has $PERMISSION permission, authorized."
              echo "is_authorized=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::User $ACTOR does not have triage+ permission and is not authorized to trigger nightly tests."
              echo "is_authorized=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Post workflow URL
        if: steps.auth.outputs.is_authorized == 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
          issue-number: ${{ github.event.client_payload.github.payload.issue.number }}
          body: |
            nightly command triggered. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
          reactions: rocket

      - name: Post unauthorized comment
        if: steps.auth.outputs.is_authorized == 'false'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
          issue-number: ${{ github.event.client_payload.github.payload.issue.number }}
          body: |
            nightly command failed: you do not have permission. Only users with triage+ permission can trigger /nightly.
          reactions: confused

      - name: Fail if unauthorized
        if: steps.auth.outputs.is_authorized == 'false'
        run: exit 1

      - name: Resolve test cases and branch
        id: resolve
        if: steps.auth.outputs.is_authorized == 'true'
        run: |
          ALL_ARGS=$(echo '${{ github.event.client_payload.slash_command.args.all }}' | xargs)
          if [ -z "$ALL_ARGS" ]; then
            echo "test_cases=all" >> "$GITHUB_OUTPUT"
            echo "branch=main" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="main"
          TEST_CASES=""
          NEXT_IS_BRANCH=0
          for WORD in $ALL_ARGS; do
            if [ "$NEXT_IS_BRANCH" = "1" ]; then
              BRANCH="$WORD"
              NEXT_IS_BRANCH=0
            elif [ "$WORD" = "--branch" ]; then
              NEXT_IS_BRANCH=1
            else
              if [ -z "$TEST_CASES" ]; then
                TEST_CASES="$WORD"
              else
                TEST_CASES="$TEST_CASES,$WORD"
              fi
            fi
          done

          # If --branch was the last word (no branch name given), ignore it
          if [ "$NEXT_IS_BRANCH" = "1" ]; then
            NEXT_IS_BRANCH=0
          fi

          if [ -z "$TEST_CASES" ]; then
            TEST_CASES="all"
          fi
          echo "test_cases=$TEST_CASES" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

  dispatch-a2:
    name: Trigger Nightly-A2
    needs: [authorize]
    if: needs.authorize.outputs.is_authorized == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch nightly-a2 workflow
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          REPO='${{ github.event.client_payload.github.payload.repository.full_name }}'
          gh workflow run schedule_nightly_test_a2.yaml \
            --repo "$REPO" \
            --ref main \
            -f test_cases='${{ needs.authorize.outputs.test_cases }}' \
            -f vllm_ascend_branch='${{ needs.authorize.outputs.branch }}'
          echo "Dispatched Nightly-A2 with test_cases='${{ needs.authorize.outputs.test_cases }}', branch='${{ needs.authorize.outputs.branch }}'"

  dispatch-a3:
    name: Trigger Nightly-A3
    needs: [authorize]
    if: needs.authorize.outputs.is_authorized == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Post workflow URL
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
          comment-id: ${{ github.event.client_payload.github.payload.comment.id }}
          body: |
            nightly command triggered.
            - Workflow run: [Periodic PR Nightly](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Tests: `${{ needs.authorize-and-parse.outputs.test_filter }}`
            - Image branch: `${{ needs.authorize-and-parse.outputs.branch }}`
            - PR ref: `${{ needs.authorize-and-parse.outputs.vllm_ascend_ref }}`
          reactions: rocket

  multi-node-tests:
    name: multi-node / ${{ matrix.test_config.name }}
    needs: [authorize-and-parse]
    if: >-
      needs.authorize-and-parse.result == 'success' &&
      needs.authorize-and-parse.outputs.multi_node_matrix != '[]'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        test_config: ${{ fromJSON(needs.authorize-and-parse.outputs.multi_node_matrix) }}
    uses: ./.github/workflows/_e2e_nightly_multi_node.yaml
    with:
      soc_version: ${{ matrix.test_config.chip }}
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/vllm-ascend:nightly-ci-${{ needs.authorize-and-parse.outputs.branch_tag }}-${{ matrix.test_config.chip }}
      config_path: ${{ matrix.test_config.config_path }}
      multi_node_type: ${{ matrix.test_config.multi_node_type }}
      extra_components: ${{ matrix.test_config.extra_components }}
      size: ${{ matrix.test_config.size }}
      name: ${{ matrix.test_config.name }}
      should_run: true
      ascend_log_prefix: /root/.cache/ascend-logs/${{ needs.authorize-and-parse.outputs.branch_tag }}
      vllm_ascend_branch: ${{ needs.authorize-and-parse.outputs.branch }}
      request_id: ${{ needs.authorize-and-parse.outputs.request_id }}
      vllm_ascend_ref: ${{ needs.authorize-and-parse.outputs.vllm_ascend_ref }}
    secrets:
      KUBECONFIG_B64: ${{ matrix.test_config.chip == 'a2' && secrets.KUBECONFIG_HK_001_INTERNAL_B64 || secrets.KUBECONFIG_B64 }}
      OBS_ACCESS_KEY: ${{ secrets.OBS_ACCESS_KEY }}
      OBS_SECRET_KEY: ${{ secrets.OBS_SECRET_KEY }}

  single-node-tests:
    name: single-node / ${{ matrix.test_config.name }}
    needs: [authorize-and-parse, multi-node-tests]
    if: >-
      always() &&
      needs.authorize-and-parse.result == 'success' &&
      needs.authorize-and-parse.outputs.single_node_matrix != '[]' &&
      (needs.multi-node-tests.result == 'success' || needs.multi-node-tests.result == 'failure' || needs.multi-node-tests.result == 'skipped')
    strategy:
      fail-fast: false
      max-parallel: 7
      matrix:
        test_config: ${{ fromJSON(needs.authorize-and-parse.outputs.single_node_matrix) }}
    uses: ./.github/workflows/_e2e_nightly_single_node.yaml
    with:
      runner: ${{ matrix.test_config.runner }}
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/vllm-ascend:nightly-ci-${{ needs.authorize-and-parse.outputs.branch_tag }}-${{ matrix.test_config.chip }}
      config_path: ${{ matrix.test_config.config_path }}
      tests: ${{ matrix.test_config.tests }}
      name: ${{ matrix.test_config.name }}
      should_run: true
      vllm_ascend_branch: ${{ needs.authorize-and-parse.outputs.branch }}
      request_id: ${{ needs.authorize-and-parse.outputs.request_id }}
      vllm_ascend_ref: ${{ needs.authorize-and-parse.outputs.vllm_ascend_ref }}
    secrets:
      OBS_ACCESS_KEY: ${{ secrets.OBS_ACCESS_KEY }}
      OBS_SECRET_KEY: ${{ secrets.OBS_SECRET_KEY }}

  accuracy-tests:
    name: accuracy / ${{ matrix.test_config.name }}
    needs: [authorize-and-parse]
    if: >-
      needs.authorize-and-parse.result == 'success' &&
      needs.authorize-and-parse.outputs.accuracy_matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        test_config: ${{ fromJSON(needs.authorize-and-parse.outputs.accuracy_matrix) }}
    uses: ./.github/workflows/_e2e_nightly_single_node_models.yaml
    with:
      runner: ${{ matrix.test_config.runner }}
      config_paths: ${{ toJson(matrix.test_config.config_paths) }}
      model_filter: all
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/vllm-ascend:nightly-ci-${{ needs.authorize-and-parse.outputs.branch_tag }}-${{ matrix.test_config.chip }}
      is_run: true
      upload: false
      request_id: ${{ needs.authorize-and-parse.outputs.request_id }}
      vllm_ascend_ref: ${{ needs.authorize-and-parse.outputs.vllm_ascend_ref }}
      vllm_ascend_branch: ${{ needs.authorize-and-parse.outputs.branch }}

  ops-tests:
    name: ops / ${{ matrix.test_config.name }}
    needs: [authorize-and-parse]
    if: >-
      needs.authorize-and-parse.result == 'success' &&
      needs.authorize-and-parse.outputs.ops_matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        test_config: ${{ fromJSON(needs.authorize-and-parse.outputs.ops_matrix) }}
    uses: ./.github/workflows/_e2e_periodic_ops.yaml
    with:
      runner: ${{ matrix.test_config.runner }}
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/vllm-ascend:nightly-ci-${{ needs.authorize-and-parse.outputs.branch_tag }}-${{ matrix.test_config.chip }}
      tests: ${{ matrix.test_config.tests }}
      name: ${{ matrix.test_config.name }}
      should_run: true
      vllm_ascend_branch: ${{ needs.authorize-and-parse.outputs.branch }}
      request_id: ${{ needs.authorize-and-parse.outputs.request_id }}
      vllm_ascend_ref: ${{ needs.authorize-and-parse.outputs.vllm_ascend_ref }}

  merge-benchmark-artifacts:
    name: Merge benchmark artifacts
    needs: [authorize-and-parse, single-node-tests, multi-node-tests, accuracy-tests, ops-tests]
    if: >-
      always() &&
      needs.authorize-and-parse.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Merge all benchmark result artifacts
        continue-on-error: true
        uses: actions/upload-artifact/merge@v7
        with:
          name: pr-nightly-test-results
          pattern: nightly-test-benchmark-results-*
          compression-level: 0
          delete-merged: true
