name: Accuracy Tests

on:
  workflow_dispatch:
    inputs:
      vllm-version:
        description: 'vllm version:'
        required: true
        type: choice
        options:
          - main
          - v0.9.0
          - v0.8.5.post1
          - v0.8.5
          - v0.8.4
          - v0.8.3
          - v0.8.3rc1
          - v0.8.2
          - v0.8.1
          - v0.8.0
          - v0.8.0rc2
          - v0.8.0rc1
          - v0.7.3
          - v0.7.2
          - v0.7.1
      vllm-ascend-version:
        description: 'vllm-ascend version:'
        required: true
        type: choice
        options:
          - main
          - v0.7.3-dev
          - v0.7.1-dev
          - v0.7.3
          - v0.8.5rc1
          - v0.8.4rc2
          - v0.8.4rc1
          - v0.7.3rc2
          - v0.7.3rc1
          - v0.7.1rc1
      models:
        description: 'model:'
        required: true
        type: choice
        options:
          - all
          - Qwen/Qwen2.5-7B-Instruct
          - meta-llama/Llama-3.1-8B-Instruct
          - Qwen/Qwen2.5-VL-7B-Instruct
          - Qwen/Qwen3-8B-Base
          - custom-model-npu-1
          - custom-modle-npu-2
          - custom-model-npu-4
        default: 'all'
      custom-model:
        description: 'custom model name:'
        required: false
        type: string


# Bash shells do not use ~/.profile or ~/.bashrc so these shells need to be explicitly
# declared as "shell: bash -el {0}" on steps that need to be properly activated.
# It's used to activate ascend-toolkit environment variables.
defaults:
  run:
    shell: bash -el {0}

jobs:
  model_tests:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include: >-
          ${{ fromJSON(
            (github.event.inputs.models == 'all' && '[{"model_name":"Qwen/Qwen2.5-7B-Instruct", "runner":"linux-arm64-npu-2"},{"model_name":"meta-llama/Llama-3.1-8B-Instruct", "runner":"linux-arm64-npu-2"},{"model_name":"Qwen/Qwen2.5-VL-7B-Instruct", "runner":"linux-arm64-npu-4"}]') ||
            (github.event.inputs.models != 'all' && format('[{{"model_name":"{0}", "runner":"linux-arm64-npu-2"}}]', github.event.inputs.models)) ||
            (github.event.inputs.models == 'custom-model-npu-1' && format('[{{"model_name":"{0}", "runner":"linux-arm64-npu-1"}}]', github.event.inputs.custom-model)) ||
            (github.event.inputs.models == 'custom-model-npu-2' && format('[{{"model_name":"{0}", "runner":"linux-arm64-npu-2"}}]', github.event.inputs.custom-model)) ||
            (github.event.inputs.models == 'custom-model-npu-4' && format('[{{"model_name":"{0}", "runner":"linux-arm64-npu-4"}}]', github.event.inputs.custom-model)) 
          ) }}
      fail-fast: false

    container:
      image: m.daocloud.io/quay.io/ascend/cann:8.1.rc1-910b-ubuntu22.04-py3.10
      env:
        HF_ENDPOINT: https://hf-mirror.com
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        DATASET_SOURCE: ModelScope

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Check npu and CANN info
        run: |
          npu-smi info
          cat /usr/local/Ascend/ascend-toolkit/latest/"$(uname -i)"-linux/ascend_toolkit_install.info

      - name: Config mirrors
        run: |
          sed -i 's|ports.ubuntu.com|mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list
          pip config set global.index-url https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple
          apt-get update -y
          apt install git -y
          git config --global url."https://gh-proxy.test.osinfra.cn/https://github.com/".insteadOf https://github.com/

      - name: Install system dependencies
        run: |
          apt-get -y install `cat packages.txt`
          apt-get -y install gcc g++ cmake libnuma-dev

      - name: Checkout vllm-project/vllm repo
        uses: actions/checkout@v4
        with:
          repository: vllm-project/vllm
          path: ./vllm-empty
          ref: ${{ github.event.inputs.vllm-version }}

      - name: Install vllm-project/vllm from source
        working-directory: ./vllm-empty
        run: VLLM_TARGET_DEVICE=empty pip install -e .
      

      - name: Checkout vllm-project/vllm-ascend repo
        uses: actions/checkout@v4
        with:
          repository: vllm-project/vllm-ascend
          path: ./vllm-ascend
          ref: ${{ github.event.inputs.vllm-ascend-version }}
          fetch-depth: 0

      - name: Install vllm-project/vllm-ascend
        working-directory: ./vllm-ascend
        run: |
          pip install -r requirements-dev.txt
          pip install -e .


      - name: Install EleutherAI/lm-evaluation-harness
        run: pip install lm-eval ray datasets==2.16.0

      - name: Collect version info
        run: |
          for dir in /usr/local/Ascend/ascend-toolkit/*; do
            dname=$(basename "$dir")
            if [ "$dname" != "latest" ]; then
              TOOLKIT_DIR="$dname"
              break
            fi
          done
          INFO_FILE="/usr/local/Ascend/ascend-toolkit/${TOOLKIT_DIR}/$(uname -i)-linux/ascend_toolkit_install.info"
          CANN_VERSION=$(grep "version=" "$INFO_FILE" \
                           | head -n1 \
                           | cut -d'=' -f2 \
                           | tr -d '"')
          MODEL_NAME_PART=$(echo "${{ matrix.model_name }}" | cut -d'/' -f2)
          {
            echo "CANN_VERSION=$CANN_VERSION"
            pip show torch | grep "Version:" | awk '{print "TORCH_VERSION="$2}'
            pip show torch_npu | grep "Version:" | awk '{print "TORCH_NPU_VERSION="$2}'
            pip show vllm | grep "Version:" | awk '{print "VLLM_VERSION="$2}' | sed 's/+.*//'
            echo "MODEL_NAME_PART=$MODEL_NAME_PART"
          } >> "$GITHUB_ENV"
      
      - name: Print versions
        run: |
          echo "CANN: ${{ env.CANN_VERSION }}"
          echo "Torch NPU: ${{ env.TORCH_NPU_VERSION }}"
          echo "Torch: ${{ env.TORCH_VERSION }}"
          echo "vLLM: ${{ env.VLLM_VERSION }}"
          mkdir -p ./accuracy/V0

      - name: Run Accuracy Test for V0
        working-directory: ./accuracy
        env:
          VLLM_USE_V1: 0
          PYTORCH_NPU_ALLOC_CONF: max_split_size_mb:256
        run: |
          python ./run_accuracy.py \
            --model "${{ matrix.model_name }}" \
            --output "./V0/${{ env.MODEL_NAME_PART }}.md" \
            --vllm_ascend_version "${{ github.event.inputs.vllm-ascend-version }}" \
            --cann_version "${{ env.CANN_VERSION }}" \
            --torch_npu_version "${{ env.TORCH_NPU_VERSION }}" \
            --torch_version "${{ env.TORCH_VERSION }}" \
            --vllm_version "${{ env.VLLM_VERSION }}" \
            --runner "${{ matrix.runner }}" \


      - name: Upload Report for V0
        uses: actions/upload-artifact@v4
        with:
          name: "${{ github.event.inputs.vllm-ascend-version }}-${{ env.MODEL_NAME_PART }}-V0-report"
          path: ./accuracy/V0/${{ env.MODEL_NAME_PART }}.md
          if-no-files-found: warn
          retention-days: 90
          overwrite: true
