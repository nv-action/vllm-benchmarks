name: 'Build csrc Cache'
on:
  workflow_call:
    inputs:
      runner:
        type: string
        required: true
        description: 'CPU runner used to build the cache.'
      device:
        type: string
        required: true
        description: 'Device type to build: a2, a3, or 310p.'
      os:
        type: string
        required: true
        description: 'Build operating system.'
      csrc_hash:
        type: string
        required: false
        default: ''
        description: 'PR csrc hash; empty calculates it for a main build.'

defaults:
  run:
    shell: bash -el {0}

env:
  UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
  UV_EXTRA_INDEX_URL: "https://repo.huaweicloud.com/ascend/repos/pypi http://cache-service.nginx-pypi-cache.svc.cluster.local/whl/cpu"
  UV_INDEX_STRATEGY: unsafe-best-match
  UV_INSECURE_HOST: cache-service.nginx-pypi-cache.svc.cluster.local
  UV_HTTP_TIMEOUT: 120
  UV_NO_CACHE: 1
  UV_SYSTEM_PYTHON: 1

jobs:
  build:
    name: build-${{ inputs.device }}-${{ inputs.runner }}-${{ inputs.os }}-cache
    runs-on: ${{ inputs.runner }}
    container:
      image: >-
        ${{
          (inputs.device == 'a2' && inputs.os == 'ubuntu' && 'swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.1-910b-ubuntu22.04-py3.12') ||
          (inputs.device == 'a3' && inputs.os == 'ubuntu' && 'swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.1-a3-ubuntu22.04-py3.12') ||
          (inputs.device == '310p' && inputs.os == 'ubuntu' && 'swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.1.0-beta.1-310p-ubuntu22.04-py3.12') ||
          (inputs.device == 'a2' && inputs.os == 'openeuler' && 'swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.1-910b-openeuler24.03-py3.12') ||
          (inputs.device == 'a3' && inputs.os == 'openeuler' && 'swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.1-a3-openeuler24.03-py3.12') ||
          (inputs.device == '310p' && inputs.os == 'openeuler' && 'swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.1.0-beta.1-310p-openeuler24.03-py3.12')
        }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Config mirrors (ubuntu)
        if: inputs.os == 'ubuntu'
        run: |
          sed -Ei 's@(ports|archive).ubuntu.com@cache-service.nginx-pypi-cache.svc.cluster.local:8081@g' /etc/apt/sources.list
          pip config set global.index-url http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
          pip config set global.trusted-host cache-service.nginx-pypi-cache.svc.cluster.local
          apt-get update -y
          apt-get install -y git zstd
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend

      - name: Config mirrors (openeuler)
        if: inputs.os == 'openeuler'
        run: |
          sed -Ei 's@https?://[^/]+/(openeuler|centos|fedora)@http://cache-service.nginx-pypi-cache.svc.cluster.local:8081/\1@g' /etc/yum.repos.d/*.repo
          pip config set global.index-url http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
          pip config set global.trusted-host cache-service.nginx-pypi-cache.svc.cluster.local
          yum install -y git zstd
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend

      - name: Install system dependencies (ubuntu)
        if: inputs.os == 'ubuntu'
        run: |
          apt-get -y install `cat packages.txt`
          apt-get -y install gcc g++ cmake libnuma-dev zstd clang-15
          update-alternatives --install /usr/bin/clang clang /usr/bin/clang-15 20
          update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-15 20
          pip install uv

      - name: Install system dependencies (openeuler)
        if: inputs.os == 'openeuler'
        run: |
          yum install -y python3-pip net-tools jemalloc numactl patch clang
          pip install uv

      - name: Get image tag
        id: get_image_tag
        run: |
          case "${{ inputs.device }}-${{ inputs.os }}" in
            a2-ubuntu) IMAGE_TAG="9.0.1-910b-ubuntu22.04-py3.12" ;;
            a3-ubuntu) IMAGE_TAG="9.0.1-a3-ubuntu22.04-py3.12" ;;
            310p-ubuntu) IMAGE_TAG="9.1.0-beta.1-310p-ubuntu22.04-py3.12" ;;
            a2-openeuler) IMAGE_TAG="9.0.1-910b-openeuler24.03-py3.12" ;;
            a3-openeuler) IMAGE_TAG="9.0.1-a3-openeuler24.03-py3.12" ;;
            310p-openeuler) IMAGE_TAG="9.1.0-beta.1-310p-openeuler24.03-py3.12" ;;
          esac
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Get csrc hash
        id: get_csrc_hash
        if: inputs.csrc_hash == ''
        run: |
          CSRC_HASH=$(find \
            ./csrc \
            ./cmake \
            ./setup.py \
            ./CMakeLists.txt \
            ./.github/workflows/push_build_csrc_cache.yaml \
            ./.github/workflows/_build_csrc_cache.yaml \
            -type f -not -path '*/.*' | sort | xargs sha256sum | sha256sum | awk '{print $1}')
          echo "CSRC_HASH=$CSRC_HASH" >> "$GITHUB_OUTPUT"

      - name: Get architecture
        id: get_arch
        if: inputs.csrc_hash == ''
        run: |
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) echo "arch=X64" >> "$GITHUB_OUTPUT" ;;
            aarch64) echo "arch=ARM64" >> "$GITHUB_OUTPUT" ;;
            *) echo "arch=$ARCH" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Cache vllm-ascend csrc
        id: cache-csrc
        uses: runs-on/cache@v5
        with:
          path: |
            vllm_ascend/_cann_ops_custom
            vllm_ascend/*.so
            vllm_ascend/lib
            vllm_ascend/include
          key: ${{ format('vllm-ascend-build-v1-{0}-{1}-{2}', inputs.csrc_hash != '' && 'ARM64' || steps.get_arch.outputs.arch, steps.get_image_tag.outputs.IMAGE_TAG, inputs.csrc_hash || steps.get_csrc_hash.outputs.CSRC_HASH) }}

      - name: Install vllm-ascend
        if: steps.cache-csrc.outputs.cache-hit != 'true'
        env:
          SOC_VERSION: >-
            ${{
              (inputs.device == 'a2' && 'ascend910b1') ||
              (inputs.device == 'a3' && 'ascend910_9391') ||
              (inputs.device == '310p' && 'ascend310p1')
            }}
          MAX_JOBS: "16"
        run: |
          source /usr/local/Ascend/ascend-toolkit/set_env.sh
          source /usr/local/Ascend/nnal/atb/set_env.sh
          arch=$(uname -i)
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/Ascend/ascend-toolkit/latest/${arch}-linux/devlib

          if [ "${{ runner.arch }}" = "X64" ]; then
            export UV_EXTRA_INDEX_URL="${UV_EXTRA_INDEX_URL} https://download.pytorch.org/whl/cpu/"
          fi

          pip install uc-manager
          # NOTE: indexes (ascend repo for triton-ascend + pytorch cpu whl) come from
          # UV_EXTRA_INDEX_URL. Do not pass --extra-index-url on the CLI here: it overrides
          # (does not append to) the env var and would drop the ascend repo.
          uv pip install -r requirements-dev.txt
          uv pip install --force-reinstall --no-deps triton-ascend==3.2.1
          uv pip install -e .
