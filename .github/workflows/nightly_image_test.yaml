name: 'image / nightly / Ubuntu / test'

on:
  schedule:
    - cron: '0 0 * * *'  # daily at 08:00 UTC+8
  workflow_dispatch:
  pull_request: 
    paths:
      - 'tools/Dockerfile'
      - 'tools/Dockerfile.a3'

jobs:
  build-and-sync:
    runs-on: 'ubuntu-22.04-arm'
    strategy:
      matrix:
        include:
          - dockerfile: tools/Dockerfile.a3
            tag_suffix: nightly-a3
          - dockerfile: tools/Dockerfile
            tag_suffix: nightly-a2

    steps:
      - uses: actions/checkout@v4

      # Login to Huawei SWR
      - name: Login to Huawei Cloud SWR
        run: |
          docker login -u "${{ secrets.HW_USERNAME }}" -p "${{ secrets.HW_TOKEN }}" swr.cn-southwest-2.myhuaweicloud.com

      - name: Build image
        id: build-image
        run: |
            IMAGE_TAG="swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/vllm-ascend:${{ matrix.tag_suffix }}"
            docker build \
            --network host \
            --platform linux/arm64 \
            -f ${{ matrix.dockerfile }} \
            --build-arg CANN_VERSION="8.3.rc1" \
            --build-arg UBUNTU_VERSION="22.04" \
            --build-arg PYTHON_VERSION="3.11" \
            -t $IMAGE_TAG .

            echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      # - name: Push to SWR
      #   run: |
      #       docker push ${{ steps.build-image.outputs.image-tag }}