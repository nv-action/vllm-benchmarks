# Lightweight reusable workflow for periodic ops tests.
# Runs pytest against the specified test target (file or directory).

name: 'e2e periodic ops test'

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
        description: GitHub Actions runner label
      image:
        required: true
        type: string
        description: Docker image to use for the test container
      tests:
        required: true
        type: string
        description: pytest target(s) — a .py file, a directory, or a space-separated list of files (one per-chip group)
      name:
        required: true
        type: string
        description: human-readable test name used in job labels and logs
      should_run:
        required: true
        type: boolean
        description: set to false to skip this job (matrix-level gate)
      vllm_ascend_branch:
        required: true
        type: string
        description: branch ref used for checkout
      request_id:
        required: false
        type: string
        default: ''
        description: non-empty when triggered by PR /nightly command
      vllm_ascend_ref:
        required: false
        type: string
        default: ''
        description: PR commit SHA for PR-triggered checkout

defaults:
  run:
    shell: bash -el {0}

# only cancel in-progress runs of the same workflow and ops target
concurrency:
  group: ascend-periodic-ops-${{ github.workflow_ref }}-${{ github.ref }}-${{ inputs.tests }}
  cancel-in-progress: true

jobs:
  ops-test:
    name: ${{ inputs.name }}
    runs-on: ${{ inputs.runner }}
    if: ${{ inputs.should_run }}
    timeout-minutes: 600
    container:
      image: ${{ inputs.image }}
    env:
      HF_HUB_OFFLINE: 1
      VLLM_USE_MODELSCOPE: True
      UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
      UV_EXTRA_INDEX_URL: "https://repo.huaweicloud.com/ascend/repos/pypi"
      UV_INDEX_STRATEGY: unsafe-best-match
      UV_NO_CACHE: 1
      UV_SYSTEM_PYTHON: 1
      VLLM_ENGINE_READY_TIMEOUT_S: 1800
    steps:
      - name: Check npu and CANN info
        run: |
          npu-smi info
          cat /usr/local/Ascend/ascend-toolkit/latest/"$(uname -i)"-linux/ascend_toolkit_install.info
          sed -Ei 's@(ports|archive).ubuntu.com@cache-service.nginx-pypi-cache.svc.cluster.local:8081@g' /etc/apt/sources.list
          pip config set global.index-url http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
          pip config set global.trusted-host cache-service.nginx-pypi-cache.svc.cluster.local
          pip install uv

      - name: uninstall vlm vllm-ascend and remove code (if pr test)
        if: ${{ inputs.request_id != '' }}
        run: |
          pip uninstall -y vllm-ascend || true
          cp -r /vllm-workspace/vllm-ascend/benchmark /tmp/aisbench-backup || true
          rm -rf  /vllm-workspace/vllm-ascend

      - name: Checkout vllm-project/vllm-ascend repo
        if: ${{ inputs.request_id != '' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.vllm_ascend_ref }}
          path: ./temp-vllm-ascend
          fetch-depth: 1

      - name: Move code to /vllm-workspace
        if: ${{ inputs.request_id != '' }}
        run: |
          mv ./temp-vllm-ascend /vllm-workspace/vllm-ascend
          ls -R /vllm-workspace

      - name: Set MAX_JOBS based on runner
        run: |
          CARDS=$(echo "${{ inputs.runner }}" | grep -oE '[0-9]+$')
          echo "MAX_JOBS=$((CARDS * 23))" >> $GITHUB_ENV

      - name: Install vllm-project/vllm-ascend
        if: ${{ inputs.request_id != '' }}
        working-directory: /vllm-workspace/vllm-ascend
        env:
          MAX_JOBS: ${{ env.MAX_JOBS }}
          PIP_EXTRA_INDEX_URL: "https://repo.huaweicloud.com/ascend/repos/pypi https://triton-ascend.osinfra.cn/pypi/simple https://download.pytorch.org/whl/cpu/"
        run: |
          git config --global --add safe.directory /vllm-workspace/vllm-ascend
          pip install uc-manager
          uv pip install -r requirements-dev.txt
          uv pip install -e .

      - name: Install aisbench
        if: ${{ inputs.request_id != '' }}
        shell: bash -l {0}
        run: |
          cp -r /tmp/aisbench-backup /vllm-workspace/vllm-ascend/benchmark
          cd /vllm-workspace/vllm-ascend/benchmark
          pip install pytest asyncio pytest-asyncio
          pip install -e . -r requirements/api.txt -r requirements/extra.txt
          python3 -m pip cache purge

      - name: Show vLLM and vLLM-Ascend version
        working-directory: /vllm-workspace
        run: |
          echo "Installed vLLM-related Python packages:"
          pip list | grep vllm || echo "No vllm packages found."

          echo ""
          echo "============================"
          echo "vLLM Git information"
          echo "============================"
          cd vllm
          if [ -d .git ]; then
            echo "Branch:      $(git rev-parse --abbrev-ref HEAD)"
            echo "Commit hash: $(git rev-parse HEAD)"
            echo "Author:      $(git log -1 --pretty=format:'%an <%ae>')"
            echo "Date:        $(git log -1 --pretty=format:'%ad' --date=iso)"
            echo "Message:     $(git log -1 --pretty=format:'%s')"
            echo "Tags:        $(git tag --points-at HEAD || echo 'None')"
            echo "Remote:      $(git remote -v | head -n1)"
            echo ""
          else
            echo "No .git directory found in vllm"
          fi
          cd ..

          echo ""
          echo "============================"
          echo "vLLM-Ascend Git information"
          echo "============================"
          cd vllm-ascend
          if [ -d .git ]; then
            echo "Branch:      $(git rev-parse --abbrev-ref HEAD)"
            echo "Commit hash: $(git rev-parse HEAD)"
            echo "Author:      $(git log -1 --pretty=format:'%an <%ae>')"
            echo "Date:        $(git log -1 --pretty=format:'%ad' --date=iso)"
            echo "Message:     $(git log -1 --pretty=format:'%s')"
            echo "Tags:        $(git tag --points-at HEAD || echo 'None')"
            echo "Remote:      $(git remote -v | head -n1)"
            echo ""
            echo "VLLM_ASCEND_VERSION=$(git rev-parse HEAD)" >> $GITHUB_ENV
          else
            echo "No .git directory found in vllm-ascend"
          fi
          cd ..

      - name: Install clang
        shell: bash -l {0}
        run: |
          apt-get update && apt-get -y install clang-15
          update-alternatives --install /usr/bin/clang clang /usr/bin/clang-15 20
          update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-15 20

      - name: Validate Inputs
        run: |
          if [[ -z "${{ inputs.tests }}" ]]; then
            echo "Error: 'tests' must be provided."
            exit 1
          fi

      - name: Run ops tests
        # 'tests' may be a single path or a space-separated list of files
        # (a per-chip group expanded from a directory entry); leave it unquoted
        # so the shell splits it into separate pytest arguments.
        env:
          VLLM_WORKER_MULTIPROC_METHOD: spawn
          VLLM_USE_MODELSCOPE: True
          VLLM_CI_RUNNER: ${{ inputs.runner }}
        working-directory: /vllm-workspace/vllm-ascend
        run: |
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
          echo "Running ops pytest with tests path: ${{ inputs.tests }}"
          pytest -s ${{ inputs.tests }}
