name: Force Cancel Runs

on:
  workflow_dispatch:
    inputs:
      run_ids:
        description: 'Workflow run IDs to force cancel, separated by spaces'
        required: true
        type: string

permissions:
  actions: write

jobs:
  force-cancel:
    name: Force cancel nightly runs
    runs-on: ubuntu-latest
    steps:
      - name: Force cancel matching runs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          INPUT_RUN_IDS: ${{ inputs.run_ids }}
        run: |
          set -euo pipefail

          read -r -a run_ids <<< "$INPUT_RUN_IDS"
          for run_id in "${run_ids[@]}"; do
            gh run cancel "$run_id" --force --repo "$REPO"
          done
