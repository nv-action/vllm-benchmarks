name: 'image / nightly / Ubuntu / test'

on:
  schedule:
    - cron: '0 0 * * *'
  pull_request:
    paths:
      - 'tools/Dockerfile'
      - 'tools/Dockerfile.a3'
  workflow_call:
    inputs:
      target:
        required: true
        type: string
        description: 'Target architecture, e.g., a2, a3'
    outputs:
      image-tag:
        description: 'The built image tag'
        value: ${{ jobs.build-and-sync.outputs.image-tag }}

jobs:
  build-and-sync:
    runs-on: ubuntu-22.04-arm

    outputs:
      image-tag: ${{ steps.build-image.outputs.image-tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up build target
        id: set-target
        run: |
          TARGET="${{ inputs.target || github.event.inputs.target || 'a3' }}"
          echo "target=$TARGET" >> $GITHUB_OUTPUT

      - name: Login to Huawei Cloud SWR
        run: |
          docker login -u "${{ secrets.HW_USERNAME }}" -p "${{ secrets.HW_TOKEN }}" swr.cn-southwest-2.myhuaweicloud.com

      - name: Build image
        id: build-image
        run: |
          TARGET="${{ steps.set-target.outputs.target }}"
          IMAGE_TAG="swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/vllm-ascend:nightly-${TARGET}"

          echo "Building image: $IMAGE_TAG"
          docker build \
            --network host \
            --platform linux/arm64 \
            -f tools/Dockerfile.${TARGET} \
            --build-arg CANN_VERSION="8.3.rc1" \
            --build-arg UBUNTU_VERSION="22.04" \
            --build-arg PYTHON_VERSION="3.11" \
            -t "$IMAGE_TAG" .

          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      # - name: Push image to SWR
      #   if: always()
      #   run: |
      #     docker push ${{ steps.build-image.outputs.image-tag }}
