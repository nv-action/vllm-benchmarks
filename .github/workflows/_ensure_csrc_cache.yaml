name: Ensure csrc Cache

on:
  workflow_call:
    inputs:
      target_ids:
        type: string
        required: true
        description: 'JSON array of csrc cache target IDs.'
      source_ref:
        type: string
        required: true
        description: 'Immutable vllm-ascend source commit.'
      repository:
        type: string
        required: false
        default: ''
        description: 'Source repository. Defaults to the current repository.'
      base_ref:
        type: string
        required: false
        default: ''
        description: 'Base ref containing the fixed base commit.'
      base_repository:
        type: string
        required: false
        default: ''
        description: 'Base repository. Defaults to the source repository.'
      base_sha:
        type: string
        required: false
        default: ''
        description: 'Fixed base commit to rebase onto.'

jobs:
  prepare:
    runs-on: linux-amd64-cpu-2-hk
    container:
      image: quay.io/ascend-ci/vllm-ascend:lint
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
      has_targets: ${{ steps.targets.outputs.has_targets }}
      csrc_hash: ${{ steps.hash.outputs.csrc_hash }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - name: Checkout cache workflow helpers
        uses: actions/checkout@v7
        with:
          path: .csrc-cache-workflow
          sparse-checkout: |
            .github/actions/prepare-source-snapshot
            .github/actions/calculate-csrc-hash
            .github/workflows/configs/csrc_cache_targets.json
            .github/workflows/scripts/get_csrc_hash.sh
            .github/workflows/scripts/resolve_csrc_cache_targets.py
          sparse-checkout-cone-mode: false

      - name: Prepare source snapshot
        uses: ./.csrc-cache-workflow/.github/actions/prepare-source-snapshot
        with:
          source-repository: ${{ inputs.repository }}
          base-repository: ${{ inputs.base_repository }}
          base-ref: ${{ inputs.base_ref }}
          base-sha: ${{ inputs.base_sha }}

      - name: Calculate csrc hash
        id: hash
        uses: ./.csrc-cache-workflow/.github/actions/calculate-csrc-hash

      - name: Resolve requested cache targets
        id: targets
        env:
          TARGET_IDS: ${{ inputs.target_ids }}
        run: |
          python3 .csrc-cache-workflow/.github/workflows/scripts/resolve_csrc_cache_targets.py \
            --target-ids "$TARGET_IDS"

  lookup-cache:
    needs: prepare
    if: needs.prepare.outputs.has_targets == 'true'
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.prepare.outputs.targets) }}
    runs-on: linux-amd64-cpu-2-hk
    container:
      image: quay.io/ascend-ci/vllm-ascend:lint
    steps:
      - name: Checkout workflow actions
        uses: actions/checkout@v7

      - name: Look up csrc cache
        id: cache
        uses: ./.github/actions/restore-csrc-cache
        with:
          cache-arch: ${{ matrix.target.cache_arch }}
          image-tag: ${{ matrix.target.image_tag }}
          csrc-hash: ${{ needs.prepare.outputs.csrc_hash }}
          lookup-only: 'true'
          cache-miss-policy: continue

      - name: Write lookup result
        env:
          TARGET: ${{ toJSON(matrix.target) }}
          CACHE_HIT: ${{ steps.cache.outputs.cache-hit }}
        run: |
          mkdir -p lookup-result
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          result = json.loads(os.environ["TARGET"])
          result["cache_hit"] = os.environ["CACHE_HIT"] == "true"
          Path(f"lookup-result/{result['id']}.json").write_text(
              json.dumps(result, separators=(",", ":")),
              encoding="utf-8",
          )
          PY

      - name: Upload lookup result
        uses: actions/upload-artifact@v7
        with:
          name: csrc-cache-lookup-${{ matrix.target.id }}
          path: lookup-result/*.json
          retention-days: 1

  collect-misses:
    needs: [prepare, lookup-cache]
    if: >-
      ${{
        always() &&
        needs.prepare.result == 'success' &&
        (needs.lookup-cache.result == 'success' || needs.lookup-cache.result == 'skipped')
      }}
    runs-on: linux-amd64-cpu-2-hk
    outputs:
      missing_targets: ${{ steps.misses.outputs.missing_targets }}
      has_missing: ${{ steps.misses.outputs.has_missing }}
    steps:
      - name: Download lookup results
        if: needs.prepare.outputs.has_targets == 'true'
        uses: actions/download-artifact@v7
        with:
          pattern: csrc-cache-lookup-*
          path: lookup-results
          merge-multiple: true

      - name: Collect cache misses
        id: misses
        env:
          HAS_TARGETS: ${{ needs.prepare.outputs.has_targets }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          missing = []
          if os.environ["HAS_TARGETS"] == "true":
              for result_path in sorted(Path("lookup-results").glob("*.json")):
                  result = json.loads(result_path.read_text(encoding="utf-8"))
                  if not result.pop("cache_hit"):
                      missing.append(result)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(
                  "missing_targets=" + json.dumps(missing, separators=(",", ":")),
                  file=output,
              )
              print(f"has_missing={str(bool(missing)).lower()}", file=output)
          PY

  build-missing:
    needs: [prepare, collect-misses]
    if: needs.collect-misses.outputs.has_missing == 'true'
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.collect-misses.outputs.missing_targets) }}
    uses: ./.github/workflows/_build_csrc_cache.yaml
    with:
      target: ${{ toJSON(matrix.target) }}
      csrc_hash: ${{ needs.prepare.outputs.csrc_hash }}
      source_ref: ${{ inputs.source_ref }}
      repository: ${{ inputs.repository }}
      base_repository: ${{ inputs.base_repository }}
      base_ref: ${{ inputs.base_ref }}
      base_sha: ${{ inputs.base_sha }}
