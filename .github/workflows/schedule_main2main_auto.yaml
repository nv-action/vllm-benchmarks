name: Main2Main Auto
run-name: >-
  ${{
    github.event_name == 'workflow_dispatch' &&
    format('Main2Main Auto target-{0}', github.event.inputs.target_commit || 'main') ||
    'Main2Main Auto detect'
  }}

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      target_commit:
        description: 'Target vLLM commit hash (default: latest vLLM main HEAD)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

defaults:
  run:
    shell: bash -el {0}

env:
  UPSTREAM_REPO: nv-action/vllm-benchmarks
  WORK_REPO_DIR: vllm-benchmarks
  VLLM_DIR: vllm-upstream
  MAIN2MAIN_SUITE: e2e-main2main  
  MAIN2MAIN_MODEL: ${{ vars.MAIN2MAIN_MODEL || 'qwen3.6-plus' }}
  CLAUDE_ALLOWED_TOOLS: Bash(git *),Bash(gh *),Bash(grep *),Bash(sed *),Bash(jq *),Bash(python3 *),Bash(mkdir *),Bash(cat *),Bash(tee *),Bash(head *),Bash(tail *),Bash(test *),Bash(ls *),Bash(find *),Bash(pwd),Read,Write,Edit,Glob,Grep
  UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
  UV_EXTRA_INDEX_URL: https://mirrors.huaweicloud.com/ascend/repos/pypi
  UV_INDEX_STRATEGY: unsafe-best-match
  UV_NO_CACHE: 1
  UV_SYSTEM_PYTHON: 1

jobs:
  main2main:
    runs-on: linux-aarch64-a2-4
    timeout-minutes: 1440
    # concurrency:
    #   group: main2main-auto
    #   cancel-in-progress: false
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:8.5.1-910b-ubuntu22.04-py3.11
      env:
        VLLM_LOGGING_LEVEL: ERROR
        VLLM_USE_MODELSCOPE: True
        HCCL_BUFFSIZE: 1024
        HF_HUB_OFFLINE: 1
        IS_SANDBOX: 1
    defaults:
      run:
        shell: bash -el {0}
        working-directory: ${{ github.workspace }}
    env:
      GH_TOKEN: ${{ secrets.PAT_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      TARGET_COMMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.target_commit || '' }}
      PIP_EXTRA_INDEX_URL: https://mirrors.huaweicloud.com/ascend/repos/pypi
      MAIN2MAIN_SKILL_PATH: ${{ github.workspace }}/vllm-benchmarks/.agents/skills/main2main/SKILL.md
      MAIN2MAIN_LOG_HELPERS: |
        print_group() {
          local title="$1"
          local path="$2"
          echo "::group::${title}"
          cat "${path}" || true
          echo "::endgroup::"
        }
        print_group_if_nonempty() {
          local title="$1"
          local path="$2"
          [ -s "${path}" ] || return 0
          print_group "${title}" "${path}"
        }
    steps:
      - name: Checkout vLLM-benchmarks fork repo
        uses: actions/checkout@v6
        with:
          repository: Meihan-chen/vllm-benchmarks
          token: ${{ secrets.PAT_TOKEN }}
          path: ${{ env.WORK_REPO_DIR }}
          fetch-depth: 0

      - name: Checkout vllm-project/vllm repo
        uses: actions/checkout@v6
        with:
          repository: vllm-project/vllm
          ref: ${{ env.TARGET_COMMIT != '' && env.TARGET_COMMIT || 'main' }}
          path: ${{ env.VLLM_DIR }}
          fetch-depth: 0

      - name: Detect vLLM version change
        id: detect
        run: |
          set -eu
          TARGET="${TARGET_COMMIT}"
          if [ -n "${TARGET}" ]; then
            if ! echo "${TARGET}" | grep -Eq '^[0-9a-f]{40}$'; then
              echo "::error::Invalid target_commit format: ${TARGET}"
              exit 1
            fi
          fi

          python3 "${WORK_REPO_DIR}/.agents/skills/main2main/scripts/detect_commits.py" \
            --vllm-path "${VLLM_DIR}" \
            --ascend-path "${WORK_REPO_DIR}" \
            > /tmp/main2main-detect.json

          OLD_COMMIT=$(python3 -c 'import json; print(json.load(open("/tmp/main2main-detect.json"))["base_commit"])')
          NEW_COMMIT=$(python3 -c 'import json; print(json.load(open("/tmp/main2main-detect.json"))["target_commit"])')
          HAS_DRIFT=$(python3 -c 'import json; print(str(json.load(open("/tmp/main2main-detect.json"))["has_drift"]).lower())')

          echo "OLD_COMMIT=${OLD_COMMIT}"
          echo "NEW_COMMIT=${NEW_COMMIT}"

          echo "old_commit=${OLD_COMMIT}" >> "$GITHUB_OUTPUT"
          echo "new_commit=${NEW_COMMIT}" >> "$GITHUB_OUTPUT"

          if [ "${HAS_DRIFT}" != "true" ]; then
            echo "::notice::No drift detected: ${OLD_COMMIT}"
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Drift detected: ${OLD_COMMIT} -> ${NEW_COMMIT}"
            echo "has_drift=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when no drift is detected
        if: steps.detect.outputs.has_drift != 'true'
        run: |
          echo "::notice::No upstream drift detected for ${{ steps.detect.outputs.new_commit }}"

      - name: Config mirrors
        if: steps.detect.outputs.has_drift == 'true'
        run: |
          sed -Ei 's@(ports|archive).ubuntu.com@cache-service.nginx-pypi-cache.svc.cluster.local:8081@g' /etc/apt/sources.list
          pip config set global.index-url http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
          pip config set global.trusted-host cache-service.nginx-pypi-cache.svc.cluster.local
          apt-get update -y
          apt-get -y install git
          git config --global --add safe.directory "$GITHUB_WORKSPACE/${WORK_REPO_DIR}"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/${VLLM_DIR}"

      - name: Install system dependencies
        if: steps.detect.outputs.has_drift == 'true'
        run: |
          if [ -s "${WORK_REPO_DIR}/packages.txt" ]; then
            xargs -r apt-get -y install < "${WORK_REPO_DIR}/packages.txt"
          fi
          apt-get -y install curl ca-certificates gcc g++ cmake libnuma-dev clang-15 jq gh
          update-alternatives --install /usr/bin/clang clang /usr/bin/clang-15 20
          update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-15 20
          pip install uv

      - name: Configure git identity and auth
        if: steps.detect.outputs.has_drift == 'true'
        working-directory: ${{ env.WORK_REPO_DIR }}
        run: |
          set -eu
          git config user.name "main2main-bot"
          git config user.email "main2main-bot@users.noreply.github.com"
          gh --version
          gh auth status
          gh api graphql -f query='query { viewer { login } }' >/dev/null
          test -n "$ANTHROPIC_BASE_URL" || { echo "::error::ANTHROPIC_BASE_URL is empty"; exit 1; }
          test -n "$ANTHROPIC_AUTH_TOKEN" || { echo "::error::ANTHROPIC_AUTH_TOKEN is empty"; exit 1; }

      - name: Check npu and CANN info
        if: steps.detect.outputs.has_drift == 'true'
        run: |
          npu-smi info || true
          if [ -d /usr/local/Ascend/ascend-toolkit/latest ]; then
            cat /usr/local/Ascend/ascend-toolkit/latest/"$(uname -i)"-linux/ascend_toolkit_install.info || true
          fi

      - name: Install vllm-project/vllm from source
        if: steps.detect.outputs.has_drift == 'true'
        working-directory: ${{ env.VLLM_DIR }}
        run: |
          VLLM_TARGET_DEVICE=empty uv pip install -e .
          uv pip uninstall -y triton || true

      - name: Create working branch
        if: steps.detect.outputs.has_drift == 'true'
        id: branch
        working-directory: ${{ env.WORK_REPO_DIR }}
        run: |
          set -eu
          BRANCH="main2main_auto_$(date +%Y-%m-%d_%H-%M)"
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" || \
            git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream main
          git checkout -B "${BRANCH}" upstream/main
          BASE_SHA=$(git rev-parse HEAD)
          echo "name=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "base_sha=${BASE_SHA}" >> "$GITHUB_OUTPUT"

      - name: Install nv-action/vllm-benchmark
        if: steps.detect.outputs.has_drift == 'true'
        working-directory: ${{ env.WORK_REPO_DIR }}
        run: |
          pip install uc-manager
          uv pip install -r requirements-dev.txt
          uv pip install -v -e .
          uv pip install git+https://github.com/modelscope/modelscope.git@dbbcbf631fe6d10cc6446df2ad2fef24039fe7fe

      - name: Prepare main2main workspace
        if: steps.detect.outputs.has_drift == 'true'
        run: mkdir -p /tmp/main2main

      - name: Install Claude skills
        if: steps.detect.outputs.has_drift == 'true'
        run: |
          set -eu
          rm -rf .claude/skills
          mkdir -p .claude
          cp -R "${WORK_REPO_DIR}/.agents/skills" .claude/skills

      - name: Run main2main skill
        if: steps.detect.outputs.has_drift == 'true'
        id: run-main2main
        uses: anthropics/claude-code-action/base-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          prompt: |
            /main2main please help to upgrade vllm ascend to a newer vLLM commit ${{ env.TARGET_COMMIT }}

            Inputs:
            - vllm_path: ${{ github.workspace }}/${{ env.VLLM_DIR }}
            - vllm_ascend_path: ${{ github.workspace }}/${{ env.WORK_REPO_DIR }}
            - working directory: ${{ github.workspace }}

            Required output:
            - Write the reviewer-facing final summary to /tmp/main2main/final-summary.md
          claude_args: >-
            --model ${{ env.MAIN2MAIN_MODEL }}
            --dangerously-skip-permissions
            --allowed-tools '${{ env.CLAUDE_ALLOWED_TOOLS }}'
          show_full_output: true
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          CLAUDE_WORKING_DIR: ${{ github.workspace }}
          CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: "1"

      - name: Verify main2main output
        if: steps.detect.outputs.has_drift == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          eval "${MAIN2MAIN_LOG_HELPERS}"

          test -s /tmp/main2main/final-summary.md
          print_group "main2main final summary" /tmp/main2main/final-summary.md

      - name: Summarize final status
        if: steps.detect.outputs.has_drift == 'true'
        id: final-status
        working-directory: ${{ env.WORK_REPO_DIR }}
        run: |
          set -eu
          eval "${MAIN2MAIN_LOG_HELPERS}"

          SUMMARY_MD=/tmp/main2main/final-summary.md
          test -s "${SUMMARY_MD}"

          python3 .github/workflows/scripts/main2main_auto.py parse-final-summary \
            --summary-md "${SUMMARY_MD}" \
            > /tmp/main2main/final-summary-parsed.json

          FINAL_STATUS=$(python3 -c 'import json; print(json.load(open("/tmp/main2main/final-summary-parsed.json")).get("status", "unknown"))')
          REACHED_COMMIT=$(python3 -c 'import json; print(json.load(open("/tmp/main2main/final-summary-parsed.json")).get("reached_commit", ""))')
          STEPS_COMPLETED=$(python3 -c 'import json; print(json.load(open("/tmp/main2main/final-summary-parsed.json")).get("steps_completed", 0))')
          STEPS_TOTAL=$(python3 -c 'import json; print(json.load(open("/tmp/main2main/final-summary-parsed.json")).get("steps_total", 0))')

          MANUAL_REVIEW_REQUIRED=false
          if [ "${FINAL_STATUS}" != "completed" ]; then
            MANUAL_REVIEW_REQUIRED=true
          fi

          python3 .github/workflows/scripts/main2main_auto.py collect-commit-range \
            --repo "${PWD}" \
            --start-ref "${{ steps.branch.outputs.base_sha }}" \
            --end-ref HEAD \
            > /tmp/main2main/created-commits.json

          git log --reverse --format='- `%H` %s' "${{ steps.branch.outputs.base_sha }}..HEAD" \
            > /tmp/main2main/created-commits.md

          COMMIT_COUNT=$(python3 -c 'import json; print(len(json.load(open("/tmp/main2main/created-commits.json"))))')

          echo "status=${FINAL_STATUS}" >> "$GITHUB_OUTPUT"
          echo "commit_count=${COMMIT_COUNT}" >> "$GITHUB_OUTPUT"
          echo "manual_review_required=${MANUAL_REVIEW_REQUIRED}" >> "$GITHUB_OUTPUT"
          echo "::notice::final_status=${FINAL_STATUS}, reached_commit=${REACHED_COMMIT}, steps=${STEPS_COMPLETED}/${STEPS_TOTAL}, commit_count=${COMMIT_COUNT}"
          print_group_if_nonempty "main2main created commits" /tmp/main2main/created-commits.md

      - name: Determine publish readiness
        if: steps.detect.outputs.has_drift == 'true'
        id: publication-state
        run: |
          set -eu
          COMMIT_COUNT="${{ steps.final-status.outputs.commit_count }}"
          SHOULD_PUBLISH=true
          if [ "${COMMIT_COUNT}" = "0" ]; then
            SHOULD_PUBLISH=false
            echo "::notice::Drift detected but no code adaptation was produced"
          fi

          echo "should_publish=${SHOULD_PUBLISH}" >> "$GITHUB_OUTPUT"
          echo "::notice::commit_count=${COMMIT_COUNT}, should_publish=${SHOULD_PUBLISH}"

      - name: Publish draft PR
        if: steps.detect.outputs.has_drift == 'true' && steps.publication-state.outputs.should_publish == 'true'
        id: create-pr
        working-directory: ${{ env.WORK_REPO_DIR }}
        run: |
          eval "${MAIN2MAIN_LOG_HELPERS}"
          BRANCH_NAME="${{ steps.branch.outputs.name }}"
          echo "Render PR body"
          python3 .github/workflows/scripts/main2main_auto.py render-pr-body \
            --old-commit "${{ steps.detect.outputs.old_commit }}" \
            --new-commit "${{ steps.detect.outputs.new_commit }}" \
            --summary-md /tmp/main2main/final-summary.md \
            --commits-md /tmp/main2main/created-commits.md \
            > /tmp/main2main-pr-body.md || {
              echo "::error::Failed while rendering PR body"
              exit 1
            }
          print_group "PR body" /tmp/main2main-pr-body.md

          echo "Normalize origin remote"
          git remote set-url origin "https://github.com/Meihan-chen/vllm-benchmarks.git" || {
            echo "::error::Failed to normalize origin remote URL"
            exit 1
          }
          git remote -v

          echo "Push branch"
          git push --force-with-lease -u origin "${BRANCH_NAME}" || {
            echo "::error::Failed while pushing branch ${BRANCH_NAME}"
            exit 1
          }

          SHORT_OLD=$(printf '%.8s' "${{ steps.detect.outputs.old_commit }}")
          SHORT_NEW=$(printf '%.8s' "${{ steps.detect.outputs.new_commit }}")
          LABEL_ARGS=(--label main2main)
          if [ "${{ steps.final-status.outputs.status }}" = "completed" ]; then
            LABEL_ARGS+=(--label ready --label ready-for-test)
          else
            LABEL_ARGS+=(--label manual-review)
          fi
          PR_URL=$(gh pr create \
            --repo "${UPSTREAM_REPO}" \
            --draft \
            --title "[Misc]feat: adapt to vLLM main (${SHORT_OLD}...${SHORT_NEW})" \
            --body-file /tmp/main2main-pr-body.md \
            --head "Meihan-chen:${BRANCH_NAME}" \
            --base main \
            "${LABEL_ARGS[@]}") || {
              echo "::error::Failed while creating draft PR"
              exit 1
            }
          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "Created draft PR: ${PR_URL}"

      - name: Create manual review issue
        if: steps.create-pr.outcome == 'success' && steps.final-status.outputs.manual_review_required == 'true'
        working-directory: ${{ env.WORK_REPO_DIR }}
        run: |
          eval "${MAIN2MAIN_LOG_HELPERS}"

          python3 .github/workflows/scripts/main2main_auto.py render-manual-review-issue \
            --pr-url "${{ steps.create-pr.outputs.url }}" \
            --old-commit "${{ steps.detect.outputs.old_commit }}" \
            --new-commit "${{ steps.detect.outputs.new_commit }}" \
            --summary-md /tmp/main2main/final-summary.md \
            > /tmp/main2main-manual-review.md
          print_group "Manual review issue" /tmp/main2main-manual-review.md
          SHORT_NEW=$(printf '%.8s' "${{ steps.detect.outputs.new_commit }}")
          gh issue create \
            --repo "${UPSTREAM_REPO}" \
            --title "main2main manual review required (${SHORT_NEW})" \
            --body-file /tmp/main2main-manual-review.md
