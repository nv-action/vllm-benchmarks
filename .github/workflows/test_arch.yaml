# This workflow builds vllm-ascend csrc and uploads the build cache to GitHub Actions.
name: 'A test arch'
on:
  workflow_dispatch:

# Bash shells do not use ~/.profile or ~/.bashrc so these shells need to be explicitly
# declared as "shell: bash -el {0}" on steps that need to be properly activated.
# It's used to activate ascend-toolkit environment variables.
defaults:
  run:
    shell: bash -el {0}

# only cancel in-progress runs of the same workflow
concurrency:
  group: ascend-csrc-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
  UV_EXTRA_INDEX_URL: https://mirrors.huaweicloud.com/ascend/repos/pypi
  UV_INDEX_STRATEGY: unsafe-best-match
  UV_NO_CACHE: 1
  UV_SYSTEM_PYTHON: 1

jobs:
  build-cache:
    name: linux-X64-${{ matrix.chip_type }}-image
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - linux-amd64-cpu-8-hk
          - linux-arm64-cpu-16
        include:
          - chip_type: a2
            image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:8.5.1-910b-ubuntu22.04-py3.11
            install_clang: true
            soc_version: ascend910b1
    container:
      image: ${{ matrix.image }}
    steps:
        - name: test arch
          run : |
            arch=$(uname -m)
            echo "Current architecture: $arch"
            echo "Expected architecture: ${{ runner.arch }}"
