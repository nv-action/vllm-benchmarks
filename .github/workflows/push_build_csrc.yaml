# This workflow builds vllm-ascend csrc and uploads the build cache to GitHub Actions.
name: 'Cache csrc Build Artifacts'
on:
  push:
    branches: [ "main" ]
    paths:
      - 'csrc/**'
      - 'setup.py'
      - 'CMakeLists.txt'
      - 'cmake/**'
  workflow_dispatch:

# Bash shells do not use ~/.profile or ~/.bashrc so these shells need to be explicitly
# declared as "shell: bash -el {0}" on steps that need to be properly activated.
# It's used to activate ascend-toolkit environment variables.
defaults:
  run:
    shell: bash -el {0}

# only cancel in-progress runs of the same workflow
concurrency:
  group: ascend-csrc-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
  UV_EXTRA_INDEX_URL: https://mirrors.huaweicloud.com/ascend/repos/pypi
  UV_INDEX_STRATEGY: unsafe-best-match
  UV_NO_CACHE: 1
  UV_SYSTEM_PYTHON: 1

jobs:
  build-cache:
    name: linux-aarch64-${{ matrix.platform }}-image
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: a2
            runner: ubuntu-latest
            image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:8.5.1-910b-ubuntu22.04-py3.11
            install_clang: true
            soc_version: ascend910b1
        #   - platform: a3
        #     runner: linux-amd64-cpu-8-hk
        #     image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:8.5.1-a3-ubuntu22.04-py3.11
        #     install_clang: true
        #     soc_version: ascend910_9391
        #   - platform: 310p
        #     runner: linux-amd64-cpu-8-hk
        #     image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:8.5.1-310p-ubuntu22.04-py3.11
        #     install_clang: false
        #     soc_version: ascend310p1
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Checkout vllm-project/vllm-ascend repo
        uses: actions/checkout@v6

      - name: Config mirrors
        run: |
          apt-get update -y
          apt install git -y
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend

      - name: Install system dependencies
        run: |
          apt-get -y install `cat packages.txt`
          apt-get -y install gcc g++ cmake libnuma-dev
          if [ "${{ matrix.install_clang }}" = "true" ]; then
            apt-get -y install clang-15
            update-alternatives --install /usr/bin/clang clang /usr/bin/clang-15 20
            update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-15 20
          fi
          pip install uv

      # We only need the image tag to distinguish different images, we don't care about the registry and repository part. 
      # So extract the image tag from the full image name and use it in the cache key.
      - name: Get image tag
        id: get_image_tag
        run: |
            IMAGE="${{ matrix.image }}"
            IMAGE_TAG="${IMAGE##*:}"
            echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Get csrc hash
        id: get_csrc_hash
        run: |
          CSRC_HASH=$(find ./csrc ./setup.py ./CMakeLists.txt ./cmake \
            -type f -not -path '*/.*' | sort | xargs sha256sum | sha256sum | awk '{print $1}')
          echo "CSRC_HASH=$CSRC_HASH" >> $GITHUB_OUTPUT

      - name: Cache vllm-ascend csrc
        uses: runs-on/cache@v4
        with:
          path: |
            vllm_ascend/_cann_ops_custom
            vllm_ascend/*.so
            vllm_ascend/lib
            vllm_ascend/include
          key: vllm-ascend-build-v1-${{ runner.arch }}-${{ matrix.image }}-${{ steps.get_csrc_hash.outputs.CSRC_HASH }}
          restore-keys: |
            vllm-ascend-build-v1-${{ runner.arch }}-${{ matrix.image }}-${{ steps.get_csrc_hash.outputs.CSRC_HASH }}

      # - name: Install vllm-project/vllm-ascend ARM
      #   env:
      #     SOC_VERSION: ${{ matrix.soc_version }}
      #   run: |
      #     if ! find vllm_ascend -maxdepth 1 -name '*.so' -type f 2>/dev/null | grep -q .; then
      #       source /usr/local/Ascend/ascend-toolkit/set_env.sh && \
      #       source /usr/local/Ascend/nnal/atb/set_env.sh && \
      #       export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/Ascend/ascend-toolkit/latest/`uname -i`-linux/devlib
      #       pip install uc-manager
      #       uv pip install -r requirements-dev.txt
      #       uv pip install -v -e .
      #     fi

      - name: Install vllm-project/vllm-ascend X64
        if: ${{ runner.arch == 'X64' }}
        env:
          SOC_VERSION: ${{ matrix.soc_version }}
        run: |
          if ! find vllm_ascend -maxdepth 1 -name '*.so' -type f 2>/dev/null | grep -q .; then
            source /usr/local/Ascend/ascend-toolkit/set_env.sh && \
            source /usr/local/Ascend/nnal/atb/set_env.sh && \
            export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/Ascend/ascend-toolkit/latest/`uname -i`-linux/devlib
            pip install uc-manager
            export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/Ascend/ascend-toolkit/latest/x86_64-linux/devlib
            uv pip install -v . --extra-index-url https://download.pytorch.org/whl/cpu/
            uv pip install -r requirements-dev.txt --extra-index-url https://download.pytorch.org/whl/cpu/
          fi
